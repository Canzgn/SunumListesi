{% extends "shared/layout.html" %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">

    <div class="bg-white p-6 rounded-2xl shadow-lg border-b-4 border-purple-500">
        <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">
            <i class="fa-solid fa-user-plus text-purple-500 mr-2"></i>Yeni Öğretmen Ekle
        </h1>
        <p class="text-xs text-gray-500 font-medium mt-1">Sisteme yeni bir öğretmen hesabı oluşturun. Hesap otomatik onaylanır.</p>
    </div>

    <form action="{{ url_for('hoca.hoca_ogretmen_ekle') }}" method="POST" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-5">
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Kullanıcı Adı *</label>
            <input type="text" name="username" required
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-bold outline-none focus:border-purple-400 transition"
                   placeholder="ornek_hoca">
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Şifre *</label>
            <input type="password" name="password" required minlength="4"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-bold outline-none focus:border-purple-400 transition"
                   placeholder="••••••">
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Ad Soyad</label>
            <input type="text" name="ad_soyad"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-bold outline-none focus:border-purple-400 transition"
                   placeholder="Prof. Dr. ...">
        </div>
        {% if bolumler %}
        <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Bölüm Ataması</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                {% for b in bolumler %}
                <label class="flex items-center gap-2 p-2.5 rounded-xl border border-gray-200 cursor-pointer hover:bg-purple-50 transition">
                    <input type="checkbox" name="bolum_ids" value="{{ b.BolumID }}" class="accent-purple-600">
                    <span class="text-xs font-bold text-gray-700">{{ b.BolumAdi }}</span>
                    <span class="text-[9px] text-gray-400 font-bold ml-auto">{{ b.OgretimTuru }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        <button type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-black text-sm transition shadow-sm">
            <i class="fa-solid fa-user-plus mr-2"></i>Öğretmen Ekle
        </button>
    </form>

</div>
{% endblock %}
