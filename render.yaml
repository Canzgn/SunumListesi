services:
  - type: web
    name: sunum-yonetim-paneli
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FLASK_DEBUG
        value: false
      - key: DB_POOL_MAX
        value: 10
      - key: PYTHON_VERSION
        value: 3.11.0
